services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # We no longer need 'depends_on: db' since we are using Neon

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

# We can remove the 'db' service and the 'volumes' section since we are using Neon
